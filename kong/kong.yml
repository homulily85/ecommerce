_format_version: "3.0"
_transform: true

services:
  - name: bank
    url: http://bank-nginx:80
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    routes:
      - name: bank-route
        paths:
          - /api/bank

  - name: shop
    url: http://shop-nginx:80
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    routes:
      - name: shop-route
        paths:
          - /api/shop

  - name: auth
    url: http://auth-service:8080
    connect_timeout: 60000
    write_timeout: 60000
    read_timeout: 60000
    routes:
      - name: auth-route
        paths:
          - /api/auth

plugins:
  - name: request-transformer
    config:
      add:
        headers:
          - "X-Kong-Api-Key:d4f8e2a1-7b3c-4f9e-a6d5-8c1b2e3f4a5d"
