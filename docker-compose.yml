services:
  kong:
    image: kong/kong-gateway:3.8.0.0
    container_name: kong
    restart: unless-stopped
    ports:
      - "7000:8000"    # Proxy
      - "7443:8443"    # Proxy (SSL)
      - "8001:8001"    # Admin
      - "7002:8002"    # GUI
      - "7444:8444"    # Admin (SSL)
    environment:
      - KONG_DATABASE=off    
      - KONG_DECLARATIVE_CONFIG=/etc/kong/kong.yml
      - KONG_ADMIN_LISTEN=0.0.0.0:8001
      - KONG_ADMIN_GUI_URL=http://localhost:7002
    volumes:
      - ./kong/kong.yml:/etc/kong/kong.yml:ro
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:7001/" ]
      interval: 30s
      timeout: 10s
      retries: 3

include:
  - ./shop/docker-compose.yml
  - ./bank/compose.yaml

